project_id = "book-digest"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "100MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = false

[edge_runtime]
enabled = true
policy = "per_worker"

# Gateway JWT verification only understands legacy JWT-based API keys, so it
# must be off when clients use the new sb_publishable_* keys. The function
# enforces authentication itself via auth.getUser().
[functions.generate-digest]
verify_jwt = false
